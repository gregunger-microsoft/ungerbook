<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ungerbook — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 30px;
        }
        h1 { color: #e94560; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 16px 24px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #e94560;
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #0f3460;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 10px 16px;
            border-bottom: 1px solid #0f3460;
            font-size: 0.85rem;
        }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.active { background: #27ae60; color: #fff; }
        .badge.expired { background: #555; color: #999; }
        .badge.pending { background: #f39c12; color: #fff; }
        .code {
            font-family: monospace;
            letter-spacing: 3px;
            color: #32cd32;
            font-weight: 600;
        }
        .refresh-btn {
            background: #0f3460;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .refresh-btn:hover { background: #16213e; border-color: #e94560; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <h1>Ungerbook Admin</h1>
    <p class="subtitle">Guestbook Registration Dashboard</p>

    <div class="stats" id="stats">
        <div class="stat-card"><div class="number" id="total-count">-</div><div class="label">Total Registrations</div></div>
        <div class="stat-card"><div class="number" id="active-count">-</div><div class="label">Currently Active</div></div>
        <div class="stat-card"><div class="number" id="expired-count">-</div><div class="label">Expired</div></div>
        <div class="stat-card"><div class="number" id="pending-count">-</div><div class="label">Pending</div></div>
    </div>

    <div class="top-bar">
        <span></span>
        <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Activation Code</th>
                <th>Status</th>
                <th>Tokens Used</th>
                <th>Registered</th>
                <th>Activated</th>
                <th>Expires</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="7" style="text-align:center;color:#555;">Loading...</td></tr>
        </tbody>
    </table>

    <script>
    (function() {
        const tableBody = document.getElementById("table-body");
        const refreshBtn = document.getElementById("refresh-btn");

        function formatDate(iso) {
            if (!iso) return "—";
            const d = new Date(iso);
            return d.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" })
                + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function getStatus(entry) {
            const now = new Date();
            const expires = new Date(entry.expires_at);
            if (now > expires) return "expired";
            if (entry.is_active) return "active";
            return "pending";
        }

        async function load() {
            try {
                const res = await fetch("/api/guestbook/admin");
                const entries = await res.json();

                let activeCount = 0, expiredCount = 0, pendingCount = 0;
                const now = new Date();

                let rows = "";
                entries.forEach(e => {
                    const status = getStatus(e);
                    if (status === "active") activeCount++;
                    else if (status === "expired") expiredCount++;
                    else pendingCount++;

                    rows += `<tr>
                        <td>${e.email}</td>
                        <td class="code">${e.activation_code}</td>
                        <td><span class="badge ${status}">${status}</span></td>
                        <td>${(e.tokens_used || 0).toLocaleString()} / ${(e.max_tokens || 100000).toLocaleString()}</td>
                        <td>${formatDate(e.created_at)}</td>
                        <td>${formatDate(e.activated_at)}</td>
                        <td>${formatDate(e.expires_at)}</td>
                    </tr>`;
                });

                document.getElementById("total-count").textContent = entries.length;
                document.getElementById("active-count").textContent = activeCount;
                document.getElementById("expired-count").textContent = expiredCount;
                document.getElementById("pending-count").textContent = pendingCount;

                tableBody.innerHTML = rows || '<tr><td colspan="7" style="text-align:center;color:#555;">No registrations yet.</td></tr>';
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#e94560;">Failed to load data.</td></tr>';
            }
        }

        refreshBtn.addEventListener("click", load);
        load();
    })();
    </script>
</body>
</html>
