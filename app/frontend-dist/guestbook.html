<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ungerbook — Guestbook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 16px;
            padding: 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
        }
        .card h1 {
            color: #e94560;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .card .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
        .card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            margin-bottom: 12px;
        }
        .card input:focus {
            border-color: #e94560;
        }
        .card input.code-input {
            text-align: center;
            letter-spacing: 8px;
            font-size: 1.4rem;
            font-family: monospace;
            text-transform: uppercase;
        }
        .card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .card button:hover { background: #c73650; }
        .card button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .code-display {
            background: #1a1a2e;
            border: 2px solid #e94560;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 2rem;
            letter-spacing: 10px;
            color: #32cd32;
            font-weight: 700;
        }
        .info {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }
        .error {
            color: #e94560;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .step { display: none; }
        .step.active { display: block; }
        .divider {
            border: none;
            border-top: 1px solid #0f3460;
            margin: 24px 0;
        }
        .back-link {
            color: #888;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 12px;
            display: inline-block;
        }
        .back-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ungerbook</h1>
        <p class="subtitle">AI Personality Chat Room</p>

        <!-- Step 1: Email entry -->
        <div id="step-email" class="step active">
            <h2>Register for Access</h2>
            <p class="info" style="margin-bottom:16px;">Enter your @microsoft.com email to receive a 1-hour activation link.</p>
            <input type="email" id="email-input" placeholder="alias@microsoft.com" autocomplete="email">
            <div id="email-error" class="error" style="display:none;"></div>
            <button id="register-btn" disabled>Send Activation Link</button>
        </div>

        <!-- Step 2: Email sent confirmation -->
        <div id="step-sent" class="step">
            <h2>Check Your Inbox</h2>
            <div style="font-size:3rem;margin:16px 0;">📧</div>
            <p style="color:#e0e0e0;font-size:0.95rem;margin-bottom:8px;">Activation link sent to:</p>
            <p id="sent-email" style="color:#32cd32;font-family:monospace;font-size:1.1rem;margin-bottom:20px;"></p>
            <p class="info">Click the link in your email to enter Ungerbook. The link expires in 1 hour.</p>
            <hr class="divider">
            <span class="back-link" id="back-link">Use a different email</span>
        </div>
    </div>

    <script>
    (function() {
        const emailInput = document.getElementById("email-input");
        const registerBtn = document.getElementById("register-btn");
        const emailError = document.getElementById("email-error");
        const stepEmail = document.getElementById("step-email");
        const stepSent = document.getElementById("step-sent");
        const sentEmail = document.getElementById("sent-email");
        const backLink = document.getElementById("back-link");

        emailInput.addEventListener("input", () => {
            const val = emailInput.value.trim().toLowerCase();
            registerBtn.disabled = !val.endsWith("@microsoft.com");
            emailError.style.display = "none";
        });

        emailInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !registerBtn.disabled) registerBtn.click();
        });

        registerBtn.addEventListener("click", async () => {
            registerBtn.disabled = true;
            registerBtn.textContent = "Sending...";
            emailError.style.display = "none";

            try {
                const res = await fetch("/api/guestbook/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: emailInput.value.trim() }),
                });
                const data = await res.json();
                if (!res.ok) {
                    emailError.textContent = data.detail || "Registration failed.";
                    emailError.style.display = "block";
                    registerBtn.disabled = false;
                    registerBtn.textContent = "Send Activation Link";
                    return;
                }

                sentEmail.textContent = emailInput.value.trim().toLowerCase();
                stepEmail.classList.remove("active");
                stepSent.classList.add("active");
            } catch (err) {
                emailError.textContent = "Network error. Try again.";
                emailError.style.display = "block";
                registerBtn.disabled = false;
                registerBtn.textContent = "Send Activation Link";
            }
        });

        backLink.addEventListener("click", () => {
            stepSent.classList.remove("active");
            stepEmail.classList.add("active");
            registerBtn.disabled = false;
            registerBtn.textContent = "Send Activation Link";
            emailInput.value = "";
            emailInput.focus();
        });
    })();
    </script>
</body>
</html>
